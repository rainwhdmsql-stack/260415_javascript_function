<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>함수 예제 6 - 이미지 슬라이드</title>
  </head>
  <body>
    <img src="images/1.jpg" alt="slideTmg" width="200" id="slideTmg"/>
    <button onclick="nextImage()">다음 -></button>
    <script>
      let images = ["images/1.jpg", "images/2.jpg", "images/3.jpg"];
      let index = 0;
      // 다음 버튼 클릭시 함수를 정의한다.
      function nextImage() {
        index++;
        if (index >= images.length) {
          index = 0;
        }
        document.querySelector("#slideTmg").src = images[index];
      }
    </script>
  </body>
</html>
